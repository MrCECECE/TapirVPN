name: Merge & Patch Happ Subscription
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Europe/Moscow

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, Clean & Merge Subscriptions
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 DEBUG: Начало загрузки подписок"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          URL1="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt"
          URL2="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS+All_RUS.txt"

          # --compressed автоматически распаковывает gzip/deflate ответы
          HTTP1=$(curl -sL --compressed --fail -w "%{http_code}" "$URL1" -o sub1.txt 2>&1)
          echo "🌐 HTTP sub1.txt: $HTTP1 | размер: $(wc -c < sub1.txt) байт | строк: $(wc -l < sub1.txt)"

          HTTP2=$(curl -sL --compressed --fail -w "%{http_code}" "$URL2" -o sub2.txt 2>&1)
          echo "🌐 HTTP sub2.txt: $HTTP2 | размер: $(wc -c < sub2.txt) байт | строк: $(wc -l < sub2.txt)"

          echo ""
          echo "🔬 Тип файла sub1.txt: $(file sub1.txt)"
          echo "🔬 Тип файла sub2.txt: $(file sub2.txt)"

          echo ""
          echo "🔬 Первые 3 строки sub1.txt:"
          head -3 sub1.txt
          echo ""
          echo "🔬 Первые 3 строки sub2.txt:"
          head -3 sub2.txt

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 DEBUG: Протоколы в исходниках (до очистки)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # -a = обрабатывать бинарные файлы как текст
          for proto in vless vmess trojan ss hysteria2 tuic wireguard; do
            C1=$(grep -ca "^${proto}://" sub1.txt 2>/dev/null || echo 0)
            C2=$(grep -ca "^${proto}://" sub2.txt 2>/dev/null || echo 0)
            echo "   ${proto}: sub1=$C1, sub2=$C2"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚙️  Очистка и объединение"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          clean_subs() {
            # -a = бинарный как текст, убираем \r, фильтруем протоколы
            grep -a -E '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' "$1" \
              | sed 's/\r//' \
              | grep -v '^$' \
              || true
          }

          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')

          {
            echo "# profile-title: 🦡TapirVPN"
            echo "# subscription-autoconnect: 1"
            echo "# subscription-autoconnect-type: lowestdelay"
            echo "# ping-type: proxy"
            echo "# check-url-via-proxy: https://cp.cloudflare.com/generate_204"
            echo "# profile-update-interval: 1"
            echo "# Merged: $MOSCOW_TIME"
            echo ""
          } > subscription.txt

          echo "📥 Обрабатываю BLACK_VLESS_RUS.txt..."
          BEFORE=$(wc -l < subscription.txt)
          clean_subs sub1.txt >> subscription.txt
          AFTER=$(wc -l < subscription.txt)
          echo "   Добавлено: $((AFTER - BEFORE)) серверов"

          echo "📥 Обрабатываю BLACK_SS+All_RUS.txt..."
          BEFORE=$(wc -l < subscription.txt)
          clean_subs sub2.txt >> subscription.txt
          AFTER=$(wc -l < subscription.txt)
          echo "   Добавлено: $((AFTER - BEFORE)) серверов"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Итоговая статистика subscription.txt"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for proto in vless vmess trojan ss hysteria2 tuic wireguard; do
            COUNT=$(grep -c "^${proto}://" subscription.txt 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "   $proto: $COUNT"
            fi
          done

          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' subscription.txt 2>/dev/null || echo 0)
          echo ""
          echo "✅ ВСЕГО серверов: $TOTAL (обновлено в $MOSCOW_TIME)"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add subscription.txt
          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')
          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' subscription.txt 2>/dev/null || echo 0)
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "⚠️ Нет изменений — subscription.txt не изменился"
          else
            git commit -m "Auto-merge $MOSCOW_TIME | $TOTAL servers"
            git push
            echo "✅ Запушено успешно"
          fi