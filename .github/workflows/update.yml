name: Merge & Patch Happ Subscription
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Europe/Moscow

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, Clean & Merge Subscriptions
        run: |
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" -o sub1.txt
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS%2BAll_RUS.txt" -o sub2.txt
          
          echo "📊 sub1.txt строк: $(wc -l < sub1.txt)"
          echo "📊 sub2.txt строк: $(wc -l < sub2.txt)"
          
          clean_subs() {
            grep -E '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' "$1" 2>/dev/null | grep -v '^$' || true
          }
          
          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')
          
          {
            echo "# profile-title: 🦡TapirVPN"
            echo "# subscription-autoconnect: 1"
            echo "# subscription-autoconnect-type: lowestdelay"
            echo "# ping-type: proxy"
            echo "# check-url-via-proxy: https://cp.cloudflare.com/generate_204"
            echo "# profile-update-interval: 1"
            echo "# Merged: $MOSCOW_TIME"
            echo ""
          } > subscription.txt
          
          echo "📥 Обрабатываю BLACK_VLESS_RUS.txt..."
          clean_subs sub1.txt >> subscription.txt
          
          echo "📥 Обрабатываю BLACK_SS+All_RUS.txt..."
          clean_subs sub2.txt >> subscription.txt
          
          echo "📊 Статистика после объединения:"
          echo "   vless: $(grep -c '^vless://' subscription.txt 2>/dev/null || echo 0)"
          echo "   hysteria2: $(grep -c '^hysteria2://' subscription.txt 2>/dev/null || echo 0)"
          echo "   ss: $(grep -c '^ss://' subscription.txt 2>/dev/null || echo 0)"
          
          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' subscription.txt 2>/dev/null || echo 0)
          echo "✅ ВСЕГО серверов: $TOTAL (обновлено в $MOSCOW_TIME)"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add subscription.txt
          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')
          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|hysteria2)://' subscription.txt 2>/dev/null || echo 0)
          git commit -m "Auto-merge $MOSCOW_TIME | $TOTAL servers" || echo "No changes"
          git push