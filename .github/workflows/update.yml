name: Merge & Patch Happ Subscription
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  merge-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Europe/Moscow

    steps:
      - uses: actions/checkout@v4

      - name: Fetch, Clean & Merge Subscriptions
        run: |
          URL1="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt"
          URL2="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS+All_RUS.txt"

          curl -sL --compressed --fail "$URL1" -o sub1.txt || { echo "❌ Ошибка загрузки sub1.txt"; exit 1; }
          curl -sL --compressed --fail "$URL2" -o sub2.txt || { echo "❌ Ошибка загрузки sub2.txt"; exit 1; }

          echo "📄 sub1.txt: $(wc -l < sub1.txt) строк"
          echo "📄 sub2.txt: $(wc -l < sub2.txt) строк"

          clean_subs() {
            grep -a -E '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' "$1" \
              | sed 's/\r//' \
              | grep -v '^$' \
              || true
          }

          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')

          {
            echo "# profile-title: 🦡TapirVPN"
            echo "# subscription-autoconnect: 1"
            echo "# subscription-autoconnect-type: lowestdelay"
            echo "# ping-type: proxy"
            echo "# check-url-via-proxy: https://cp.cloudflare.com/generate_204"
            echo "# profile-update-interval: 1"
            echo "# Merged: $MOSCOW_TIME"
            echo ""
          } > subscription.txt

          clean_subs sub1.txt >> subscription.txt
          clean_subs sub2.txt >> subscription.txt

          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' subscription.txt || echo 0)
          echo "✅ Итого серверов: $TOTAL (обновлено в $MOSCOW_TIME)"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add subscription.txt
          MOSCOW_TIME=$(TZ=Europe/Moscow date +'%Y-%m-%d %H:%M MSK')
          TOTAL=$(grep -cE '^(vless|vmess|trojan|ss|ssr|hysteria|hysteria2|tuic|wireguard)://' subscription.txt || echo 0)
          if git diff --cached --quiet; then
            echo "⚠️ Нет изменений — пропускаем коммит"
          else
            git commit -m "Auto-merge $MOSCOW_TIME | $TOTAL servers"
            git push
            echo "✅ Запушено: $TOTAL серверов"
          fi